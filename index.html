<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el amor de mi vida</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fecaca 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: #dc2626;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: latido 2s infinite;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .amor-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .amor-img:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(220, 38, 38, 0.3);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal p {
            font-size: 1.25rem;
            color: #374151;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-si {
            background-color: #22c55e;
            color: white;
        }

        .btn-si:hover {
            background-color: #16a34a;
        }

        .btn-no {
            background-color: #ef4444;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-no:hover {
            background-color: #dc2626;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .modal p { font-size: 1.1rem; }
            .btn { padding: 10px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tú eres el amor de mi vida</h1>
        <img src="amor.avif" alt="Amor de mi vida" class="amor-img" id="openModalBtn">
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <p>Quiero que formes parte de mi vida y que seas mi compañera de vida. ¿Estarías dispuesta a serlo?</p>
            <div class="btn-container">
                <a href="https://www.youtube.com/watch?v=RGfOor4QbUA&list=RDRGfOor4QbUA&start_radio=1&autoplay=1" target="_blank" class="btn btn-si">Sí</a>
                <a href="no.html" class="btn btn-no">No</a>
            </div>
        </div>
    </div>

    <script>
        const openModalBtn = document.getElementById('openModalBtn');
        const modalOverlay = document.getElementById('modalOverlay');

        openModalBtn.addEventListener('click', () => {
            modalOverlay.classList.add('active');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
    </script>

</body>
</html>
